---
layout: compress
---
<!doctype html>
<html lang="en" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div id="main" role="main">
      {% include sidebar.html %}
    
      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            {{ content }}
          </section>
        </div>
      </article>
    </div>

    <script src="https://www.unpkg.com/mouse-firework@latest/dist/index.umd.js"></script>
    {% include scripts.html %}

    {% unless page.disable_live2d %}
    <script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>
    <script>
      (function () {
        var viewportWidth = window.innerWidth || document.documentElement.clientWidth || 1280;
        var isSmallScreen = viewportWidth < 980;
        var widgetWidth = Math.round(Math.max(220, Math.min(360, viewportWidth * 0.24)));
        var widgetHeight = Math.round(widgetWidth * 1.52);

        L2Dwidget.init({
          model: {
            jsonPath: "https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/kp31_310/model.json"
          },
          display: {
            position: "right",
            width: widgetWidth,
            height: widgetHeight,
            hOffset: isSmallScreen ? -34 : -68,
            vOffset: isSmallScreen ? -250 : -350
          },
          mobile: {
            show: false,
            scale: 0.25,
            motion: false
          }
        });
      })();
    </script>
    {% endunless %}
  </body>

</html>
