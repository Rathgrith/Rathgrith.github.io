<footer
  class="site-runtime"
  data-site-runtime
  data-site-start="{{ site.site_started_at | default: '2023-10-28T12:31:48-05:00' }}"
  data-site-commit="{{ site.site_started_commit | default: '' }}"
  aria-live="off"
>
  <div class="site-runtime__inner">
    <span class="site-runtime__label">Site Runtime</span>
    <time class="site-runtime__elapsed" data-site-runtime-elapsed datetime="PT0S">0d 00h 00m 00s</time>
    <span class="site-runtime__since">since <time data-site-runtime-since datetime="">--</time></span>
  </div>
</footer>
