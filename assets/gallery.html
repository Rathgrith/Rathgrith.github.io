---
layout: default
title: "Gallery"
permalink: /gallery/
author_profile: false
body_class: "standalone-page gallery-page"
---
<header class="page-header">
        <div class="header-inner">
            <h1>Gallery</h1>
            <p class="page-subtitle">A selection of 2D images.</p>
        </div>
    </header>

    <main class="gallery-container" role="main">
        <div class="gallery" id="gallery">
            <!-- JavaScript will populate this section -->
        </div>
        <div class="gallery-actions" role="group" aria-label="Gallery loading controls">
            <button
                type="button"
                id="load-more"
                class="button gallery-action"
                data-default-label="Load more photos"
                data-done-label="All photos loaded"
                data-icon="fas fa-plus"
                data-done-icon="fas fa-check"
            >
                <span class="gallery-action__icon" aria-hidden="true"><i class="fas fa-plus"></i></span>
                <span class="gallery-action__label">Load more photos</span>
                <span class="gallery-action__spinner" aria-hidden="true"></span>
            </button>
            <button
                type="button"
                id="load-all"
                class="button gallery-action"
                data-default-label="Load all photos"
                data-done-label="All photos loaded"
                data-icon="fas fa-layer-group"
                data-done-icon="fas fa-check"
            >
                <span class="gallery-action__icon" aria-hidden="true"><i class="fas fa-layer-group"></i></span>
                <span class="gallery-action__label">Load all photos</span>
                <span class="gallery-action__spinner" aria-hidden="true"></span>
            </button>
        </div>
    </main>

    <footer class="page-footer">
        <div class="footer-inner">
            <p>Thumbnails open the full-resolution images in a new tab.</p>
        </div>
    </footer>

        // Directories for thumbnails and original images
        const thumbnailDir = "{{ '/images/gallery/thumbnails/' | relative_url }}";
        const originalDir = "{{ '/images/gallery/originals/' | relative_url }}";

        const gallery = document.getElementById("gallery");
        const galleryActions = document.querySelector(".gallery-actions");
        const loadMoreButton = document.getElementById("load-more");
        const loadAllButton = document.getElementById("load-all");

        const INITIAL_BATCH_SIZE = 10;
        const LOAD_BATCH_SIZE = 5;
        const MIN_LOADING_MS = 260;

        const filenames = Object.keys(captions).sort(() => Math.random() - 0.5);
        let currentIndex = 0;
        let isRenderingBatch = false;

        function setButtonLabel(button, text) {
            if (!button) return;
            const label = button.querySelector(".gallery-action__label");
            if (label) {
                label.textContent = text;
                return;
            }
            button.textContent = text;
        }

        function setButtonIcon(button, iconClass) {
            if (!button || !iconClass) return;
            const icon = button.querySelector(".gallery-action__icon i");
            if (!icon) return;
            icon.className = iconClass;
        }

        function setButtonLoading(button, loading) {
            if (!button) return;
            button.classList.toggle("is-loading", loading);
            button.setAttribute("aria-busy", loading ? "true" : "false");
        }

        function setCompletedLayout(completed) {
            if (galleryActions) {
                galleryActions.classList.toggle("is-complete", completed);
            }

            if (loadAllButton) {
                loadAllButton.hidden = completed;
                loadAllButton.style.display = completed ? "none" : "";
                loadAllButton.setAttribute("aria-hidden", completed ? "true" : "false");
                if (completed) {
                    loadAllButton.setAttribute("tabindex", "-1");
                } else {
                    loadAllButton.removeAttribute("tabindex");
                }
            }
        }

        function createGalleryItem(filename, indexInBatch) {
            const thumbnail = document.createElement("a");
            thumbnail.href = originalDir + filename;
            thumbnail.target = "_blank";

            const img = document.createElement("img");
            img.src = thumbnailDir + filename;
            img.alt = captions[filename];
            thumbnail.appendChild(img);

            const caption = document.createElement("div");
            caption.className = "caption";
            caption.textContent = captions[filename];

            const item = document.createElement("div");
            item.className = "gallery-item";
            item.style.transitionDelay = `${indexInBatch * 60}ms`;
            item.appendChild(thumbnail);
            item.appendChild(caption);

            return item;
        }

        function revealItems(items) {
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    items.forEach((item) => item.classList.add("is-visible"));
                });
            });
        }

        function updateButtonState() {
            const remaining = filenames.length - currentIndex;
            const completed = remaining <= 0;
            setCompletedLayout(completed);

            if (loadMoreButton) {
                if (completed) {
                    loadMoreButton.dataset.state = "done";
                    loadMoreButton.disabled = true;
                    setButtonLabel(loadMoreButton, loadMoreButton.dataset.doneLabel || "All photos loaded");
                    setButtonIcon(loadMoreButton, loadMoreButton.dataset.doneIcon || "fas fa-check");
                } else {
                    loadMoreButton.dataset.state = "ready";
                    loadMoreButton.disabled = false;
                    setButtonLabel(loadMoreButton, loadMoreButton.dataset.defaultLabel || "Load more photos");
                    setButtonIcon(loadMoreButton, loadMoreButton.dataset.icon || "fas fa-plus");
                }
            }

            if (loadAllButton) {
                if (completed) {
                    loadAllButton.dataset.state = "done";
                    loadAllButton.disabled = true;
                    setButtonLabel(loadAllButton, loadAllButton.dataset.doneLabel || "All photos loaded");
                    setButtonIcon(loadAllButton, loadAllButton.dataset.doneIcon || "fas fa-check");
                } else {
                    loadAllButton.dataset.state = "ready";
                    loadAllButton.disabled = false;
                    setButtonLabel(loadAllButton, loadAllButton.dataset.defaultLabel || "Load all photos");
                    setButtonIcon(loadAllButton, loadAllButton.dataset.icon || "fas fa-layer-group");
                }
            }
        }

        function renderNextBatch(batchSize) {
            if (currentIndex >= filenames.length || batchSize <= 0) {
                return;
            }

            const nextFiles = filenames.slice(currentIndex, currentIndex + batchSize);
            const fragment = document.createDocumentFragment();
            const newItems = [];

            nextFiles.forEach((filename, indexInBatch) => {
                const item = createGalleryItem(filename, indexInBatch);
                fragment.appendChild(item);
                newItems.push(item);
            });

            gallery.appendChild(fragment);
            revealItems(newItems);

            currentIndex += nextFiles.length;
        }

        function setLoadingControls(activeButton, loading) {
            [loadMoreButton, loadAllButton].forEach((button) => {
                if (!button) return;

                if (loading) {
                    button.disabled = true;
                    setButtonLoading(button, button === activeButton);
                    return;
                }

                setButtonLoading(button, false);
            });
        }

        function runBatchAction(button, batchSizeGetter) {
            if (!button || isRenderingBatch || button.disabled) return;

            isRenderingBatch = true;
            const start = performance.now();
            setLoadingControls(button, true);

            requestAnimationFrame(() => {
                const batchSize = typeof batchSizeGetter === "function" ? batchSizeGetter() : 0;
                renderNextBatch(batchSize);

                const elapsed = performance.now() - start;
                const wait = Math.max(0, MIN_LOADING_MS - elapsed);

                setTimeout(() => {
                    isRenderingBatch = false;
                    setLoadingControls(button, false);
                    updateButtonState();
                }, wait);
            });
        }

        if (loadMoreButton) {
            loadMoreButton.addEventListener("click", () => {
                runBatchAction(loadMoreButton, () => LOAD_BATCH_SIZE);
            });
        }

        if (loadAllButton) {
            loadAllButton.addEventListener("click", () => {
                runBatchAction(loadAllButton, () => filenames.length - currentIndex);
            });
        }

        renderNextBatch(INITIAL_BATCH_SIZE);
        updateButtonState();
    </script>
